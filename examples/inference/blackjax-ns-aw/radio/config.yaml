likelihoods:
- type: constraints_eos
  enabled: true
- type: radio
  enabled: true
  pulsars:
  - name: J1614
    mass_mean: 1.94
    mass_std: 0.06
  - name: J0740
    mass_mean: 2.08
    mass_std: 0.14
  nb_masses: 100
sampler:
  type: blackjax-ns-aw
  n_live: 1400
  n_delete_frac: 0.5
  n_target: 60
  max_mcmc: 5000
  max_proposals: 1000
  termination_dlogz: 0.1
  n_eos_samples: 10000
  output_dir: ./outdir/
postprocessing:
  enabled: true
  make_cornerplot: false
  make_massradius: true
  make_pressuredensity: true
