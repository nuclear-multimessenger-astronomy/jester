seed: 43
dry_run: false
validate_only: false

eos:
  type: metamodel_cse
  ndat_metamodel: 100
  nmax_nsat: 25.0
  nb_CSE: 8
  crust_name: DH

tov:
  type: anisotropy
  min_nsat_TOV: 0.75
  ndat_TOV: 100
  nb_masses: 100

prior:
  specification_file: prior.prior

likelihoods:
- type: constraints_eos
  enabled: true
- type: zero
  enabled: true

sampler:
  type: smc-rw
  n_particles: 5000
  n_mcmc_steps: 10
  target_ess: 0.9
  random_walk_sigma: 0.05
  n_eos_samples: 5000
  output_dir: ./outdir/

postprocessing:
  enabled: true
  make_cornerplot: false
  make_massradius: true
  make_pressuredensity: true
