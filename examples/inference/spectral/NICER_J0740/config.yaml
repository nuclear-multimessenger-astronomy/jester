seed: 45
dry_run: false
validate_only: false
eos:
  type: spectral
  crust_name: SLy
  n_points_high: 100
tov:
  ndat_TOV: 100
  nb_masses: 100
  min_nsat_TOV: 0.75
  type: gr
prior:
  specification_file: prior.prior
likelihoods:
- type: constraints_eos
  enabled: true
- type: constraints_gamma
  enabled: true
  penalty_gamma: -1e5
- type: nicer
  enabled: true
  pulsars:
  - name: J0740
    amsterdam_samples_file: ../../../../jesterTOV/inference/data/NICER/J07406620_amsterdam_gamma_NICERXMM_equal_weights_recent.npz
    maryland_samples_file: ../../../../jesterTOV/inference/data/NICER/J07406620_maryland_unknown_NICERXMM_RM.npz
  N_masses_evaluation: 20
  N_masses_batch_size: 20
sampler:
  type: smc-rw
  n_particles: 1000
  n_mcmc_steps: 10
  target_ess: 0.9
  random_walk_sigma: 0.05
  n_eos_samples: 1000
  output_dir: ./outdir/
postprocessing:
  enabled: true
  make_cornerplot: true
  make_massradius: true
  make_pressuredensity: true
