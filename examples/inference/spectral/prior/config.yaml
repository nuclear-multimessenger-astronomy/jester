seed: 42
dry_run: false
validate_only: false
eos:
  type: spectral
  crust_name: SLy
  n_points_high: 500
tov:
  ndat_TOV: 100
  nb_masses: 100
  min_nsat_TOV: 0.75
  type: gr
prior:
  specification_file: prior.prior
likelihoods:
- type: constraints_eos
  enabled: true
- type: constraints_gamma
  enabled: true
  penalty_gamma: -1e3
sampler:
  type: smc-rw
  n_particles: 1000
  n_mcmc_steps: 5
  target_ess: 0.9
  random_walk_sigma: 0.1
  n_eos_samples: 2000
  log_prob_batch_size: 100
  output_dir: ./outdir/
postprocessing:
  enabled: true
  make_cornerplot: true
  make_massradius: true
  make_pressuredensity: true
