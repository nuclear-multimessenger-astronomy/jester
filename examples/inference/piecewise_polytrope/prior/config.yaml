seed: 45
dry_run: false
validate_only: false
eos:
  type: piecewise_polytrope
  n_points: 500
tov:
  type: gr
  min_nsat_TOV: 0.75
  ndat_TOV: 100
  nb_masses: 100
prior:
  specification_file: prior.prior
likelihoods:
- type: constraints_eos
  enabled: true
- type: zero
  enabled: true
sampler:
  type: smc-rw
  n_particles: 1000
  n_mcmc_steps: 10
  target_ess: 0.9
  random_walk_sigma: 0.1
  output_dir: ./outdir/
postprocessing:
  enabled: true
  make_cornerplot: false
  make_massradius: true
  make_pressuredensity: true
